<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐧 企鹅测试报告</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f7fa;
      color: #333;
      line-height: 1.6;
      padding: 16px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      font-size: 22px;
      color: #0052D9;
      margin-bottom: 4px;
      text-align: center;
    }
    .test-meta {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-bottom: 20px;
    }

    #test-summary { margin-bottom: 20px; }
    .test-summary-card {
      text-align: center;
      padding: 20px;
      background: #fff;
      border-radius: 14px;
      border: 2px solid #e0e0e0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .test-summary-icon { font-size: 36px; margin-bottom: 6px; }
    .test-summary-rate { font-size: 36px; font-weight: 700; }
    .test-summary-detail { font-size: 13px; color: #888; margin-top: 4px; }

    .test-suites { display: flex; flex-direction: column; gap: 12px; }
    .test-suite {
      background: #fff;
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.04);
    }
    .suite-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .suite-title { font-size: 14px; font-weight: 600; }
    .suite-badge {
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 10px;
      background: #f0f0f0;
      color: #888;
      font-weight: 500;
    }

    .test-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 5px 0;
      font-size: 13px;
      border-bottom: 1px solid #f7f7f7;
      flex-wrap: wrap;
    }
    .test-item:last-child { border-bottom: none; }
    .test-icon { font-weight: 700; flex-shrink: 0; width: 16px; }
    .test-pass .test-icon { color: #00A870; }
    .test-fail .test-icon { color: #E34D59; }
    .test-name { color: #333; flex: 1; min-width: 0; }
    .test-error {
      width: 100%;
      margin-left: 24px;
      font-size: 11px;
      color: #E34D59;
      background: #fef2f2;
      padding: 3px 8px;
      border-radius: 4px;
      word-break: break-all;
    }

    .btn-run {
      display: block;
      margin: 20px auto;
      padding: 10px 32px;
      background: #0052D9;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-run:hover { background: #266FE8; }
    .btn-run:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

    .loading-text { text-align: center; color: #999; padding: 20px; font-size: 14px; }
  </style>
</head>
<body>
  <h1>🐧 企鹅测试报告</h1>
  <div class="test-meta">AI企鹅养成 v3.3 | 浏览器内测试框架</div>

  <div id="test-summary"></div>

  <div id="test-app">
    <div class="loading-text">🔄 加载测试模块中...</div>
  </div>

  <button class="btn-run" id="btn-run" disabled>▶ 运行测试</button>

  <!-- 项目JS依赖（测试需要加载实际模块） -->
  <script src="../js/theme.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/keywords.js"></script>
  <script src="../js/activity.js"></script>
  <script src="../js/offline-qa.js"></script>
  <script src="../js/memory.js"></script>
  <script src="../js/diary.js"></script>
  <script src="../js/knowledge.js"></script>
  <script src="../js/volunteer.js"></script>
  <script src="../js/penguin.js"></script>
  <script src="../js/dressup.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/chat.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/app.js"></script>

  <!-- 测试框架 -->
  <script src="runner.js"></script>
  <script src="test-keywords.js"></script>
  <script src="test-chat-quality.js"></script>
  <script src="test-memory.js"></script>
  <script src="test-storage.js"></script>
  <script src="test-offline-qa.js"></script>
  <script src="test-app-state.js"></script>

  <script>
    (function() {
      const btnRun = document.getElementById('btn-run');
      const appEl = document.getElementById('test-app');

      // 等待所有脚本加载完成
      function waitForModules() {
        return new Promise((resolve) => {
          let checks = 0;
          const interval = setInterval(() => {
            checks++;
            if (typeof App !== 'undefined' && typeof ChatEngine !== 'undefined') {
              clearInterval(interval);
              resolve();
            } else if (checks > 100) {
              clearInterval(interval);
              resolve(); // 超时也继续
            }
          }, 100);
        });
      }

      waitForModules().then(() => {
        // 初始化 UI 结构
        TestRunner.initUI();

        // 启用按钮
        btnRun.disabled = false;
        btnRun.textContent = '▶ 运行测试';

        btnRun.addEventListener('click', async function() {
          btnRun.disabled = true;
          btnRun.textContent = '⏳ 运行中...';

          // 重置 UI
          TestRunner.initUI();

          // 运行所有测试
          await TestRunner.run();

          btnRun.disabled = false;
          btnRun.textContent = '🔄 重新运行';
        });

        // 自动运行
        btnRun.click();
      });
    })();
  </script>
</body>
</html>
